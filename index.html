<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>드라마 MVP</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<main>
  <h1>한 줄 아이디어로<br>드라마 숏폼 만들기</h1>

  <section id="settings">
    <button id="settingsToggle" type="button">⚙️ 서버 주소 설정</button>
    <div id="settingsPanel" class="hidden">
      <input id="apiBaseInput" type="text" placeholder="https://xxxx.ngrok-free.app">
      <button id="apiBaseSave" type="button">저장</button>
    </div>
  </section>

  <section id="inputView">
    <textarea id="ideaInput" placeholder="예: 재벌 3세 남주가 신분을 숨기고 편의점 아르바이트를 하다 사장 딸과 계약연애를 하게 된다" rows="4"></textarea>
    <button id="startChatBtn" type="button">이야기 시작하기</button>
  </section>

  <section id="chatView" class="hidden">
    <div id="chatMessages"></div>
    <div id="chatOptions" class="hidden"></div>
    <div id="chatInputRow">
      <textarea id="chatInput" placeholder="답장을 입력하세요" rows="1"></textarea>
      <button id="chatSendBtn" type="button">보내기</button>
    </div>
    <button id="finalizeBtn" type="button">✨ 이걸로 기획 시작하기</button>
  </section>

  <section id="pitchView" class="hidden">
    <h2>주인공</h2>
    <div id="charactersBox"></div>

    <h2>1화 임팩트 장면</h2>
    <div id="keySceneBox" class="key-scene">
      <div id="keySceneImageBox" class="key-scene-photo-placeholder">이미지 생성 중…</div>
      <div id="keySceneLines" class="key-scene-lines"></div>
    </div>

    <h2>로그라인</h2>
    <div id="loglineDisplay" class="pitch-block"></div>
    <textarea id="loglineEdit" class="hidden pitch-edit" rows="3"></textarea>

    <div class="pitch-actions">
      <button id="editPitchBtn" type="button">✏️ 수정</button>
      <button id="regenPitchBtn" type="button">🔁 재생성</button>
    </div>
    <button id="backToChatBtn" type="button">↩️ 다시 기획하기</button>
    <button id="nextStageBtn" type="button">다음 단계 →</button>
  </section>

  <section id="videoPrepView" class="hidden">
    <h2>영상 만들기</h2>
    <img id="videoPrepImage" class="key-scene-photo" alt="1화 임팩트 장면">
    <p id="videoPrepText">이 장면을 영상으로 만들 준비가 됐어요.</p>
    <button id="goToStudioBtn" type="button">🎬 스튜디오로 이동</button>
    <button id="videoPrepBackBtn" type="button">↩️ 돌아가기</button>
  </section>

  <section id="studioView" class="hidden">
    <h2 id="studioLogline" class="pitch-block"></h2>

    <h3>캐릭터</h3>
    <div id="studioRoster" class="studio-roster"></div>
    <button id="addCharacterBtn" type="button">+ 캐릭터 추가</button>

    <h3>전체 줄거리</h3>
    <div id="studioSynopsis" class="pitch-block"></div>

    <h3>화 목록</h3>
    <div id="studioEpisodes" class="studio-episodes"></div>
    <button id="addEpisodeBtn" type="button">+ 새 화</button>
  </section>

  <section id="characterDetailView" class="hidden">
    <div id="characterDetailImageBox" class="character-detail-photo-placeholder"></div>
    <button id="regenPortraitBtn" type="button">🔁 사진 다시 생성</button>

    <label>이름</label>
    <input id="charNameInput" type="text">
    <div class="char-row">
      <div>
        <label>성별</label>
        <select id="charGenderInput">
          <option value="">선택 안 함</option>
          <option value="남">남</option>
          <option value="여">여</option>
        </select>
      </div>
      <div>
        <label>나이</label>
        <input id="charAgeInput" type="text" placeholder="예: 28">
      </div>
    </div>
    <label>포지션</label>
    <input id="charRoleInput" type="text" placeholder="예: 재벌 3세">
    <label>핵심 대사</label>
    <textarea id="charLineInput" rows="2"></textarea>
    <label>외형</label>
    <textarea id="charAppearanceInput" rows="2" placeholder="예: 큰 키, 짧은 흑발, 날카로운 눈매"></textarea>
    <label>설명</label>
    <textarea id="charDescriptionInput" rows="3" placeholder="성격·배경 등 자유 서술"></textarea>

    <div class="pitch-actions">
      <button id="saveCharacterBtn" type="button">✅ 저장</button>
      <button id="deleteCharacterBtn" type="button">🗑️ 삭제</button>
    </div>
    <button id="closeCharacterDetailBtn" type="button">↩️ 스튜디오로 돌아가기</button>
  </section>

  <section id="progressView" class="hidden">
    <div class="spinner"></div>
    <p id="stageText">대기 중</p>
    <ul id="stageList">
      <li data-key="기획안">기획안</li>
      <li data-key="대본">대본</li>
      <li data-key="씬 설계">씬 설계</li>
      <li data-key="샷 분해">샷 분해</li>
      <li data-key="영상 제작">이미지·영상 제작</li>
      <li data-key="합본">합본</li>
    </ul>
  </section>

  <section id="resultView" class="hidden">
    <video id="resultVideo" controls playsinline></video>
    <button id="restartBtn" type="button">다시 만들기</button>
  </section>

  <section id="errorView" class="hidden">
    <p id="errorText"></p>
    <button id="errorRetryBtn" type="button">다시 시도</button>
  </section>
</main>
<script src="app.js"></script>
</body>
</html>
